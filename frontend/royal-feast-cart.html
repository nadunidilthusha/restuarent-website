<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Feast - Cart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #141414;
    color: #fff;
  }
  a { text-decoration: none; color: inherit; }

  /* NAVBAR */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #141414;
    padding: 16px 40px;
  }
  .logo { font-size: 18px; font-weight: 700; }
  .logo .accent { color: #ff6a00; }
  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
    font-size: 13.5px;
  }
  .nav-links a { color: #ccc; transition: color 0.15s ease; }
  .nav-links a.active, .nav-links a:hover { color: #ff6a00; }
  .order-btn {
    background: #ff6a00;
    color: #fff;
    padding: 9px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
  }
  .order-btn:hover { background: #e85f00; }

  /* LAYOUT */
  .cart-page {
    display: flex;
    gap: 30px;
    padding: 30px 40px;
    align-items: flex-start;
  }

  .left-col { flex: 1.6; min-width: 300px; }
  .right-col { flex: 1; min-width: 300px; }

  .section-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 24px; }

  .food-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .dish-card {
    background: #1e1e1e;
    border-radius: 10px;
    overflow: hidden;
  }
  .dish-card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
  }
  .dish-info { padding: 12px 14px; }
  .dish-info h4 { font-size: 14.5px; margin-bottom: 4px; }
  .dish-info p { font-size: 11.5px; color: #999; margin-bottom: 10px; }
  .dish-footer { display: flex; align-items: center; justify-content: space-between; }
  .dish-price { font-size: 13px; font-weight: 700; color: #fff; }
  .dish-order-btn {
    background: #ff6a00;
    color: #fff;
    border: none;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
  }
  .dish-order-btn:hover { background: #e85f00; }

  /* CART BOX */
  .cart-box {
    background: #1e1e1e;
    border-radius: 10px;
    overflow: hidden;
  }
  .cart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: #232323;
  }
  .cart-header h3 { font-size: 15px; font-weight: 700; }
  .cart-header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
  }

  .cart-items { padding: 6px 18px; }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #2a2a2a;
  }
  .cart-item:last-child { border-bottom: none; }
  .item-thumb {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .item-details { flex: 1; }
  .item-details h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .item-details p { font-size: 11px; color: #999; }
  .item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border-radius: 14px;
    padding: 3px 8px;
    color: #000;
  }
  .item-qty button {
    background: none;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: #000;
    width: 16px;
  }
  .item-qty span { font-size: 12.5px; font-weight: 600; min-width: 12px; text-align: center; }
  .remove-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 15px;
    cursor: pointer;
    margin-left: 4px;
  }
  .remove-btn:hover { color: #e53935; }

  .coupon-section { padding: 16px 18px 10px; }
  .coupon-section p { font-size: 12px; color: #ccc; margin-bottom: 8px; }
  .coupon-row { display: flex; gap: 8px; }
  .coupon-row input {
    flex: 1;
    background: #2c2c2c;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    padding: 9px 12px;
    color: #fff;
    font-size: 12.5px;
    outline: none;
  }
  .coupon-row input::placeholder { color: #888; }
  .coupon-row input:focus { border-color: #ff6a00; }
  .apply-btn {
    background: #2a2a2a;
    color: #fff;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .apply-btn:hover { background: #3a3a3a; }

  .totals-section { padding: 14px 18px; }
  .totals-row {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: #ccc;
    padding: 5px 0;
  }
  .totals-row.divider { border-top: 1px solid #2a2a2a; margin-top: 6px; padding-top: 10px; font-weight: 700; color: #fff; }

  .checkout-btn {
    display: block;
    width: calc(100% - 36px);
    margin: 0 18px 18px;
    background: #ff6a00;
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .checkout-btn:hover { background: #e85f00; }

  @media (max-width: 800px) {
    .cart-page { flex-direction: column; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><span class="accent">Royal</span> Feast</div>
  <ul class="nav-links">
    <li><a href="royal-feast-home.html">Home</a></li>
    <li><a href="royal-feast-menu.html">Menu</a></li>
    <li><a href="royal-feast-services.html">Services</a></li>
    <li><a href="royal-feast-about.html">About Us</a></li>
    <li><a href="royal-feast-contact.html">Contact</a></li>
  </ul>
  <a href="royal-feast-auth.html"><button class="order-btn">Order Now</button></a>
</nav>

<div class="cart-page">

  <div class="left-col">
    <h2 class="section-title">Resent Foods</h2>
    <div class="food-grid" id="food-grid"></div>
  </div>

  <div class="right-col">
    <div class="cart-box">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <span class="dot"></span>
      </div>

      <div class="cart-items" id="cart-items"></div>

      <div class="coupon-section">
        <p>Have a coupon code?</p>
        <div class="coupon-row">
          <input type="text" id="coupon-input" placeholder="Enter coupon code">
          <button class="apply-btn" id="apply-btn">Apply</button>
        </div>
      </div>

      <div class="totals-section">
        <div class="totals-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="totals-row"><span>Delivery Fee</span><span id="delivery">$3.00</span></div>
        <div class="totals-row"><span>Tax</span><span id="tax">$0.00</span></div>
        <div class="totals-row divider"><span>Total</span><span id="grand-total">$0.00</span></div>
      </div>

      <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
    </div>
  </div>

</div>

<script>
  const cartData = [
    { name: 'Seafood Pizza', price: 20.00, img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=100&q=80', qty: 1 },
    { name: 'Double Patty Monster Burger', price: 12.00, img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=100&q=80', qty: 1 },
    { name: 'Iced Coffee', price: 3.50, img: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=100&q=80', qty: 1 }
  ];

  const foodItems = [
    { name: 'Classic Beef Burger', desc: 'Cheesy beef burger', price: 'Rs 650', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80' },
    { name: 'Chicken Cheese Burger', desc: 'Italian style pizza', price: 'Rs 750', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&q=80' },
    { name: 'Classic Beef Burger', desc: 'Cheesy beef burger', price: 'Rs 650', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80' },
    { name: 'Chicken Cheese Burger', desc: 'Italian style pizza', price: 'Rs 750', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&q=80' },
    { name: 'Classic Beef Burger', desc: 'Cheesy beef burger', price: 'Rs 650', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80' },
    { name: 'Chicken Cheese Burger', desc: 'Italian style pizza', price: 'Rs 750', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&q=80' }
  ];

  const foodGrid = document.getElementById('food-grid');
  foodItems.forEach(item => {
    const card = document.createElement('a');
    card.href = 'royal-feast-food-detail.html';
    card.className = 'dish-card';
    card.style.display = 'block';
    card.style.textDecoration = 'none';
    card.style.color = 'inherit';
    card.innerHTML = `
      <img src="${item.img}" alt="${item.name}">
      <div class="dish-info">
        <h4>${item.name}</h4>
        <p>${item.desc}</p>
        <div class="dish-footer">
          <span class="dish-price">${item.price}</span>
          <button class="dish-order-btn">Order</button>
        </div>
      </div>
    `;
    foodGrid.appendChild(card);
  });

  const cartItemsEl = document.getElementById('cart-items');

  function renderCart() {
    cartItemsEl.innerHTML = '';
    cartData.forEach((item, index) => {
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = `
        <img class="item-thumb" src="${item.img}" alt="${item.name}">
        <div class="item-details">
          <h4>${item.name}</h4>
          <p>Rs.${(item.price * 100).toFixed(0)}</p>
        </div>
        <div class="item-qty">
          <button class="qty-minus" data-index="${index}">-</button>
          <span>${item.qty}</span>
          <button class="qty-plus" data-index="${index}">+</button>
        </div>
        <button class="remove-btn" data-index="${index}">🗑</button>
      `;
      cartItemsEl.appendChild(row);
    });

    document.querySelectorAll('.qty-plus').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = btn.dataset.index;
        cartData[i].qty++;
        renderCart();
        calculateTotals();
      });
    });
    document.querySelectorAll('.qty-minus').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = btn.dataset.index;
        if (cartData[i].qty > 1) cartData[i].qty--;
        renderCart();
        calculateTotals();
      });
    });
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = btn.dataset.index;
        cartData.splice(i, 1);
        renderCart();
        calculateTotals();
      });
    });
  }

  function calculateTotals() {
    const subtotal = cartData.reduce((sum, item) => sum + item.price * item.qty, 0);
    const delivery = subtotal > 0 ? 3.00 : 0;
    const tax = subtotal * 0.07;
    const total = subtotal + delivery + tax;

    document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('delivery').textContent = '$' + delivery.toFixed(2);
    document.getElementById('tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('grand-total').textContent = '$' + total.toFixed(2);
  }

  renderCart();
  calculateTotals();

  document.getElementById('apply-btn').addEventListener('click', () => {
    const code = document.getElementById('coupon-input').value.trim();
    if (code) {
      alert('Coupon "' + code + '" applied! (demo only)');
    }
  });

  document.getElementById('checkout-btn').addEventListener('click', () => {
    window.location.href = 'royal-feast-checkout.html';
  });
</script>

</body>
</html>
